name: Build Kotlin Android App

on:
  push:
    branches:
      - main
      - Kotlin
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kotlin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug — show environment
        run: |
          java -version
          echo "Gradle wrapper exists: $(test -f android-kotlin/gradlew && echo yes || echo no)"

      - name: Create local.properties
        run: |
          cd android-kotlin
          # Use secrets if available; otherwise dummy values so compilation succeeds.
          # Unit tests do not hit the real Supabase API.
          URL="${{ secrets.VITE_SUPABASE_URL }}"
          KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "SUPABASE_URL=${URL:-https://xqleyxrftyehodksashu.supabase.co}" > local.properties
          echo "SUPABASE_ANON_KEY=${KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxbGV5eHJmdHllaG9ka3Nhc2h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY1ODI0MDAsImV4cCI6MjA1MjE1ODQwMH0.ciJ}" >> local.properties
          echo "--- local.properties contents (key masked) ---"
          cat local.properties | sed 's/ANON_KEY=.*/ANON_KEY=***MASKED***/'

      - name: Grant execute permission for gradlew
        run: chmod +x android-kotlin/gradlew

      - name: Compile Kotlin (debug)
        run: |
          cd android-kotlin
          ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: |
          cd android-kotlin
          ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Build Debug APK
        run: |
          cd android-kotlin
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK with timestamp
        run: |
          cd android-kotlin
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Covault-Kotlin-${TIMESTAMP}.apk
          echo "APK_NAME=Covault-Kotlin-${TIMESTAMP}.apk" >> $GITHUB_ENV

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: android-kotlin/app/build/outputs/apk/debug/Covault-Kotlin-*.apk
          retention-days: 14
          compression-level: 0

<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc"/>
  
  <!-- Chart container with rounded corners -->
  <rect x="50" y="50" width="700" height="300" rx="24" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#94a3b8" letter-spacing="2">BUDGET SPENDING FLOW</text>
  
  <!-- Month labels -->
  <text x="140" y="320" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#94a3b8">Jan 2024</text>
  <text x="310" y="320" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#94a3b8">Feb 2024</text>
  <text x="480" y="320" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#94a3b8">Mar 2024</text>
  <text x="650" y="320" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#94a3b8">Apr 2024</text>
  
  <!-- January flows -->
  <g opacity="0.8">
    <rect x="100" y="260" width="80" height="35" rx="4" fill="#3b82f6"/> <!-- Housing -->
    <rect x="100" y="220" width="80" height="35" rx="4" fill="#10b981"/> <!-- Groceries -->
    <rect x="100" y="185" width="80" height="30" rx="4" fill="#f59e0b"/> <!-- Transport -->
    <rect x="100" y="160" width="80" height="20" rx="4" fill="#8b5cf6"/> <!-- Utilities -->
    <rect x="100" y="130" width="80" height="25" rx="4" fill="#ec4899"/> <!-- Leisure -->
    <rect x="100" y="110" width="80" height="15" rx="4" fill="#6b7280"/> <!-- Other -->
  </g>
  
  <!-- February flows -->
  <g opacity="0.8">
    <rect x="270" y="255" width="80" height="40" rx="4" fill="#3b82f6"/>
    <rect x="270" y="210" width="80" height="40" rx="4" fill="#10b981"/>
    <rect x="270" y="180" width="80" height="25" rx="4" fill="#f59e0b"/>
    <rect x="270" y="155" width="80" height="20" rx="4" fill="#8b5cf6"/>
    <rect x="270" y="125" width="80" height="25" rx="4" fill="#ec4899"/>
    <rect x="270" y="105" width="80" height="15" rx="4" fill="#6b7280"/>
  </g>
  
  <!-- March flows -->
  <g opacity="0.8">
    <rect x="440" y="260" width="80" height="35" rx="4" fill="#3b82f6"/>
    <rect x="440" y="220" width="80" height="35" rx="4" fill="#10b981"/>
    <rect x="440" y="185" width="80" height="30" rx="4" fill="#f59e0b"/>
    <rect x="440" y="158" width="80" height="22" rx="4" fill="#8b5cf6"/>
    <rect x="440" y="128" width="80" height="25" rx="4" fill="#ec4899"/>
    <rect x="440" y="110" width="80" height="13" rx="4" fill="#6b7280"/>
  </g>
  
  <!-- April flows -->
  <g opacity="0.8">
    <rect x="610" y="258" width="80" height="37" rx="4" fill="#3b82f6"/>
    <rect x="610" y="218" width="80" height="35" rx="4" fill="#10b981"/>
    <rect x="610" y="188" width="80" height="25" rx="4" fill="#f59e0b"/>
    <rect x="610" y="163" width="80" height="20" rx="4" fill="#8b5cf6"/>
    <rect x="610" y="135" width="80" height="23" rx="4" fill="#ec4899"/>
    <rect x="610" y="118" width="80" height="12" rx="4" fill="#6b7280"/>
  </g>
  
  <!-- Icons (simplified) -->
  <circle cx="310" cy="230" r="8" fill="white" opacity="0.9"/>
  <text x="310" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#10b981">🥬</text>
  
  <!-- Legend -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6"/>
    <text x="18" y="10" font-family="Arial" font-size="10" fill="#64748b">Housing</text>
    
    <rect x="90" y="0" width="12" height="12" rx="2" fill="#10b981"/>
    <text x="108" y="10" font-family="Arial" font-size="10" fill="#64748b">Groceries</text>
    
    <rect x="190" y="0" width="12" height="12" rx="2" fill="#f59e0b"/>
    <text x="208" y="10" font-family="Arial" font-size="10" fill="#64748b">Transport</text>
    
    <rect x="290" y="0" width="12" height="12" rx="2" fill="#8b5cf6"/>
    <text x="308" y="10" font-family="Arial" font-size="10" fill="#64748b">Utilities</text>
    
    <rect x="380" y="0" width="12" height="12" rx="2" fill="#ec4899"/>
    <text x="398" y="10" font-family="Arial" font-size="10" fill="#64748b">Leisure</text>
    
    <rect x="470" y="0" width="12" height="12" rx="2" fill="#6b7280"/>
    <text x="488" y="10" font-family="Arial" font-size="10" fill="#64748b">Other</text>
  </g>
  
  <!-- Annotation -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b" font-style="italic">Tap any budget flow to see detailed breakdown</text>
</svg>
